# Arena project config — support ticket triage demo

dataset: dataset.jsonl
default_model: gpt-4o-mini
judge_model: claude-haiku-4-5
optimizer_model: claude-sonnet-4-6

# Evaluators applied to every case result. The runner scores each result
# against all three so a single run gives us exact-match accuracy (cheap,
# deterministic) AND a judge verdict on reply quality (LLM-based, slower).
evaluators:
  - type: exact_match
    field: urgency

  - type: exact_match
    field: category

  - type: json_parse
    fields: [urgency, category, suggested_reply]

  - type: judge
    judge: rubric
    name: helpfulness
    criterion: >
      Does the suggested reply directly acknowledge the customer's issue,
      set clear expectations, and offer a next step?
    target_field: suggested_reply

  - type: judge
    judge: ensemble
    name: reply_quality
    judges:
      - type: judge
        judge: rubric
        name: clarity
        criterion: Is the reply clear and free of jargon?
        target_field: suggested_reply
      - type: judge
        judge: rubric
        name: tone
        criterion: Does the reply sound like a real person, not a corporate script?
        target_field: suggested_reply

# Fallback chain if the default model errors out.
fallback_chain:
  - model: gpt-4o-mini
    fallbacks: [gpt-4o]
  - model: claude-haiku-4-5
    fallbacks: [claude-sonnet-4-6]
